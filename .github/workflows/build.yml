name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Read version from ToolscreenVersion.cmake
        id: version
        shell: pwsh
        run: |
          $content = Get-Content ToolscreenVersion.cmake -Raw
          $major = [regex]::Match($content, 'VERSION_MAJOR\s+(\d+)').Groups[1].Value
          $minor = [regex]::Match($content, 'VERSION_MINOR\s+(\d+)').Groups[1].Value
          $patch = [regex]::Match($content, 'VERSION_PATCH\s+(\d+)').Groups[1].Value
          $version = "$major.$minor.$patch"
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Configure and build release artifacts
        shell: cmd
        run: build.bat release --test

      - name: Prepare upload directory
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $src = 'out/build/bin/Release'
          $dst = 'upload'
          New-Item -ItemType Directory -Path $dst -Force | Out-Null

          Copy-Item (Join-Path $src 'Toolscreen.dll') (Join-Path $dst "Toolscreen-$version.dll")
          Copy-Item (Join-Path $src 'Toolscreen.pdb') (Join-Path $dst "Toolscreen-$version.pdb")

          # Jar and exe already have version from CMake (e.g. Toolscreen-1.1.5-double-click-me.jar)
          Get-ChildItem $src -Filter '*.jar' | Copy-Item -Destination $dst
          # Only copy the double-click-me exe (skip the raw EasyInject exe)
          Get-ChildItem $src -Filter '*double-click-me*.exe' | Copy-Item -Destination $dst

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: toolscreen-v${{ steps.version.outputs.version }}
          if-no-files-found: error
          retention-days: 14
          path: upload/
