name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configure and build release artifacts
        shell: cmd
        run: build.bat release --test

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: toolscreen-release-artifacts
          if-no-files-found: error
          retention-days: 14
          path: |
            out/build/bin/Release/Toolscreen.dll
            out/build/bin/Release/Toolscreen.pdb
            out/build/bin/Release/Toolscreen-*-double-click-me.jar
            out/build/bin/Release/Toolscreen-*-double-click-me.exe
            out/build/bin/Release/toolscreen-downloader.jar
            out/build/bin/Release/toolscreen-downloader.exe