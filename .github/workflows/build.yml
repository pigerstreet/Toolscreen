name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Read version from ToolscreenVersion.cmake
        id: version
        shell: pwsh
        run: |
          $content = Get-Content ToolscreenVersion.cmake -Raw
          $major = [regex]::Match($content, 'VERSION_MAJOR\s+(\d+)').Groups[1].Value
          $minor = [regex]::Match($content, 'VERSION_MINOR\s+(\d+)').Groups[1].Value
          $patch = [regex]::Match($content, 'VERSION_PATCH\s+(\d+)').Groups[1].Value
          $version = "$major.$minor.$patch"
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Configure and build release artifacts
        shell: cmd
        run: build.bat release --test

      - name: Rename release artifacts
        shell: pwsh
        run: |
          $outputDir = 'out/build/bin/Release'
          $version = '${{ steps.version.outputs.version }}'
          $suffix = "-$version"

          $filesToRename = @(
            Join-Path $outputDir 'Toolscreen.dll'
            Join-Path $outputDir 'Toolscreen.pdb'
          )

          $filesToRename += Get-ChildItem $outputDir -File -Filter '*.jar' | Select-Object -ExpandProperty FullName
          $filesToRename += Get-ChildItem $outputDir -File -Filter '*.exe' | Select-Object -ExpandProperty FullName

          foreach ($filePath in $filesToRename) {
            if (-not (Test-Path $filePath)) {
              throw "Expected artifact not found: $filePath"
            }

            $item = Get-Item $filePath
            $renamed = '{0}{1}{2}' -f $item.BaseName, $suffix, $item.Extension
            Move-Item -Path $item.FullName -Destination (Join-Path $item.DirectoryName $renamed)
          }

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: toolscreen-v${{ steps.version.outputs.version }}
          if-no-files-found: error
          retention-days: 14
          path: |
            out/build/bin/Release/Toolscreen-${{ steps.version.outputs.version }}.dll
            out/build/bin/Release/Toolscreen-${{ steps.version.outputs.version }}.pdb
            out/build/bin/Release/*-${{ steps.version.outputs.version }}.jar
            out/build/bin/Release/*-${{ steps.version.outputs.version }}.exe